name: 🧠 Crypto Trading Bot - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-and-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: 1
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: trading_test
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/trading_test
      BINANCE_TESTNET: "true"
      JWT_SECRET_KEY: "ci-test-secret-key-at-least-32-chars-long"
      ADMIN_USERNAME: "ci_admin"
      ADMIN_PASSWORD: "ci_password"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: ⚡ Install uv package manager
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 💾 Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: 📦 Install dependencies
        run: |
          uv sync --frozen --all-extras

      - name: ⏳ Wait for PostgreSQL
        run: |
          python -c "
          import socket
          import time
          for i in range(30):
              try:
                  socket.create_connection(('localhost', 5432), timeout=2)
                  print('✅ PostgreSQL is ready')
                  exit(0)
              except Exception:
                  print(f'⏳ Waiting for PostgreSQL... ({i+1}/30)')
                  time.sleep(1)
          exit(1)
          "

      - name: 🔍 Run Linting (ruff)
        run: |
          echo "🔍 Running Linting Checks..."
          uv run ruff check src/ tests/ --fix

      - name: 📝 Check code formatting (ruff format)
        run: |
          echo "📝 Checking Code Format..."
          uv run ruff format src/ tests/ --check

      - name: 🧪 Type check with mypy
        run: |
          echo "🧪 Running Type Checks..."
          uv run python -m mypy --config-file pyproject.toml src tests
          uv run python -m mypy --config-file mypy.ini src tests

      - name: 🧪 Run unit tests with pytest
        run: |
          echo "🧪 Running Unit Tests..."
          uv run pytest tests/ \
            --maxfail=3 \
            --tb=short \
            --disable-warnings \
            -v

      - name: 📊 Run tests with coverage
        run: |
          echo "📊 Running Tests with Coverage..."
          uv run pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

      - name: 📦 Build package
        run: |
          echo "📦 Building Package..."
          python -m pip install build
          python -m build

      - name: ✅ Summary
        run: |
          echo "✅ All checks completed!"
          echo "📊 Coverage report available in HTML format"
